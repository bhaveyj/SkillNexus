services:
  - type: web
    name: skillnexus-ws
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npx tsx server/websocketServer.ts
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

